<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Conector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a1628;
      color: #e0e6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f1f3d;
      border-bottom: 1px solid #1a3a6e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header svg { flex-shrink: 0; }
    header h1 { font-size: 20px; font-weight: 600; color: #fff; }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 24px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: #0f1f3d;
      border: 1px solid #1a3a6e;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
    }

    .card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #7eb8ff;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #8a9bb5;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #081222;
      border: 1px solid #1a3a6e;
      border-radius: 8px;
      color: #e0e6ed;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-group input::placeholder { color: #4a5d7a; }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-connect { background: #25d366; color: #0a1628; }
    .btn-connect:hover:not(:disabled) { background: #1fb855; }

    .btn-cancel { background: transparent; border: 1px solid #1a3a6e; color: #8a9bb5; margin-top: 12px; }
    .btn-cancel:hover:not(:disabled) { border-color: #ef4444; color: #ef4444; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result section */
    .result {
      margin-top: 24px;
      text-align: center;
      display: none;
    }

    .result.active { display: block; }

    .result-status {
      font-size: 13px;
      color: #8a9bb5;
      margin-bottom: 16px;
    }

    .pairing-code {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      font-family: 'Consolas', 'Courier New', monospace;
      padding: 20px;
      background: #081222;
      border-radius: 12px;
      border: 1px solid #1a3a6e;
      margin-bottom: 12px;
    }

    .pairing-instructions {
      font-size: 13px;
      color: #8a9bb5;
      line-height: 1.6;
      margin-top: 12px;
    }

    .pairing-instructions strong { color: #e0e6ed; }

    .qr-container {
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .qr-container img {
      max-width: 256px;
      display: block;
    }

    .timer {
      font-size: 14px;
      color: #f59e0b;
      margin-top: 12px;
      font-weight: 600;
    }

    .success-msg {
      font-size: 18px;
      color: #25d366;
      font-weight: 600;
      padding: 20px;
    }

    .success-msg svg { margin-bottom: 8px; }

    .error-msg {
      font-size: 14px;
      color: #ef4444;
      padding: 12px;
      background: #2e0a0a;
      border: 1px solid #450a0a;
      border-radius: 8px;
      margin-top: 16px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 3s forwards;
      max-width: 360px;
    }

    .toast-success { background: #052e16; color: #25d366; border: 1px solid #14532d; }
    .toast-error { background: #2e0a0a; color: #ef4444; border: 1px solid #450a0a; }
    .toast-info { background: #0c1f3d; color: #7eb8ff; border: 1px solid #1a3a6e; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

    @media (max-width: 640px) {
      .container { padding: 24px 16px; }
      .card { padding: 24px 20px; }
      .pairing-code { font-size: 28px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>

  <header>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#25d366">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    <h1>WhatsApp Conector</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>Conectar Instancia</h2>

      <div id="formSection">
        <div class="form-group">
          <label>Numero de Telefone</label>
          <input type="text" id="phoneInput" placeholder="5571999999999" />
        </div>
        <div class="form-group">
          <label>Token da Instancia</label>
          <input type="text" id="tokenInput" placeholder="Token fornecido pela uazapi" />
        </div>
        <button class="btn btn-connect" id="connectBtn" onclick="connect()">
          Conectar
        </button>
      </div>

      <div class="result" id="resultSection">
        <div id="resultContent"></div>
        <div class="timer" id="timerLabel" style="display:none"></div>
        <button class="btn btn-cancel" onclick="reset()">Cancelar / Nova conexao</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_BASE_URL = 'https://benitechlab.uazapi.com';
    const PAIRING_TIMEOUT = 300; // 5 min for pairing code
    const QR_TIMEOUT = 120;      // 2 min for QR code
    const STATUS_POLL_INTERVAL = 3000;

    let pollInterval = null;
    let countdownInterval = null;
    let timeLeft = 0;
    let currentMode = null; // 'pairing' or 'qr'

    function toast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    async function connect() {
      const phone = document.getElementById('phoneInput').value.trim();
      const token = document.getElementById('tokenInput').value.trim();

      if (!token) {
        toast('Informe o token da instancia', 'error');
        return;
      }

      const btn = document.getElementById('connectBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Conectando...';

      try {
        const body = {};
        if (phone) body.phone = phone;

        const res = await fetch(`${API_BASE_URL}/instance/connect`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'token': token
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        console.log('API /instance/connect response:', JSON.stringify(data, null, 2));

        if (!res.ok) {
          throw new Error(data.message || data.error || `Erro HTTP ${res.status}`);
        }

        // API returns data inside "instance" object
        const inst = data.instance || data;

        // Already connected?
        if (data.connected || inst.status === 'connected') {
          showSuccess(phone || 'Instancia');
          return;
        }

        // Pairing code?
        const code = inst.paircode || inst.pairingCode || inst.pairing_code
          || inst.code || data.paircode || data.pairingCode || data.code || null;
        if (code) {
          currentMode = 'pairing';
          showPairingCode(code, phone);
          startStatusPolling(token, phone);
          return;
        }

        // QR Code?
        const qr = inst.qrcode || inst.qr || inst.qrCode
          || data.qrcode || data.qr || data.qrCode || null;
        if (qr) {
          currentMode = 'qr';
          showQRCode(qr);
          startStatusPolling(token, phone);
          return;
        }

        // Unknown response — show the raw response so user can report
        currentMode = 'pairing';
        showUnknownResponse(data);
        startStatusPolling(token, phone);

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = 'Conectar';

        if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
          toast('Falha de conexao com a API. Verifique sua internet.', 'error');
        } else {
          showError(err.message);
        }
      }
    }

    function showPairingCode(code, phone) {
      document.getElementById('formSection').style.display = 'none';
      const result = document.getElementById('resultSection');
      result.classList.add('active');

      const formatted = code.replace(/(.{4})/g, '$1-').replace(/-$/, '');

      document.getElementById('resultContent').innerHTML = `
        <div class="result-status">Codigo de pareamento gerado</div>
        <div class="pairing-code">${formatted}</div>
        <div class="pairing-instructions">
          No seu celular, abra o <strong>WhatsApp</strong><br>
          Va em <strong>Configuracoes → Aparelhos conectados → Conectar aparelho</strong><br>
          Toque em <strong>"Conectar com numero de telefone"</strong><br>
          Digite o codigo acima
        </div>
      `;

      startCountdown(PAIRING_TIMEOUT);
    }

    function showQRCode(qrData) {
      document.getElementById('formSection').style.display = 'none';
      const result = document.getElementById('resultSection');
      result.classList.add('active');

      const src = qrData.startsWith('data:') ? qrData : `data:image/png;base64,${qrData}`;

      document.getElementById('resultContent').innerHTML = `
        <div class="result-status">QR Code gerado</div>
        <div class="qr-container">
          <img src="${src}" alt="QR Code" />
        </div>
        <div class="pairing-instructions">
          No seu celular, abra o <strong>WhatsApp</strong><br>
          Va em <strong>Configuracoes → Aparelhos conectados → Conectar aparelho</strong><br>
          Escaneie o QR Code acima
        </div>
      `;

      startCountdown(QR_TIMEOUT);
    }

    function showUnknownResponse(data) {
      document.getElementById('formSection').style.display = 'none';
      const result = document.getElementById('resultSection');
      result.classList.add('active');

      const json = JSON.stringify(data, null, 2);
      document.getElementById('resultContent').innerHTML = `
        <div class="result-status">Resposta da API (formato nao reconhecido):</div>
        <pre style="text-align:left;background:#081222;padding:16px;border-radius:8px;font-size:12px;color:#7eb8ff;overflow-x:auto;max-height:300px;border:1px solid #1a3a6e">${json}</pre>
      `;

      startCountdown(PAIRING_TIMEOUT);
    }

    function showSuccess(phone) {
      document.getElementById('formSection').style.display = 'none';
      stopAll();

      const result = document.getElementById('resultSection');
      result.classList.add('active');
      document.getElementById('timerLabel').style.display = 'none';

      document.getElementById('resultContent').innerHTML = `
        <div class="success-msg">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="#25d366">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          <div>Conectado com sucesso!</div>
        </div>
      `;

      toast('WhatsApp conectado com sucesso!', 'success');
    }

    function showError(msg) {
      document.getElementById('formSection').style.display = 'none';
      const result = document.getElementById('resultSection');
      result.classList.add('active');
      document.getElementById('timerLabel').style.display = 'none';

      document.getElementById('resultContent').innerHTML = `
        <div class="error-msg">${msg}</div>
      `;
    }

    function startCountdown(seconds) {
      timeLeft = seconds;
      const label = document.getElementById('timerLabel');
      label.style.display = '';
      label.textContent = `Tempo restante: ${formatTime(timeLeft)}`;

      countdownInterval = setInterval(() => {
        timeLeft--;
        label.textContent = `Tempo restante: ${formatTime(timeLeft)}`;
        if (timeLeft <= 0) {
          stopAll();
          showError('Tempo esgotado. Tente novamente.');
          toast('Tempo esgotado', 'error');
        }
      }, 1000);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m > 0 ? `${m}:${sec.toString().padStart(2, '0')}` : `${s}s`;
    }

    function startStatusPolling(token, phone) {
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/instance/status`, {
            method: 'GET',
            headers: { 'Accept': 'application/json', 'token': token }
          });
          const data = await res.json();

          if (data.connected || data.status === 'connected' || data.status === 'CONNECTED' || data.state === 'open') {
            stopAll();
            showSuccess(phone || 'Instancia');
          }
        } catch (_) {}
      }, STATUS_POLL_INTERVAL);
    }

    function stopAll() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    function reset() {
      stopAll();
      currentMode = null;

      document.getElementById('formSection').style.display = '';
      document.getElementById('resultSection').classList.remove('active');
      document.getElementById('resultContent').innerHTML = '';
      document.getElementById('timerLabel').style.display = 'none';

      const btn = document.getElementById('connectBtn');
      btn.disabled = false;
      btn.innerHTML = 'Conectar';
    }

    // Enter key support
    document.getElementById('phoneInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('tokenInput').focus();
    });
    document.getElementById('tokenInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') connect();
    });
  </script>

</body>
</html>
